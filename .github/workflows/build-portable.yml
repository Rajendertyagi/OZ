name: Build Portable

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-portable.yml'
      - 'config/config.yaml'
      - 'apps/cli/src/config/**'
      - 'packages/utils/src/config/**'

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  build-portable:
    name: Build portable folder
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (cli + browse web + wasm)
        run: bun run build

      - name: Verify build output
        run: |
          test -f apps/cli/dist/index.js || { echo "MISSING dist/index.js"; exit 1; }
          test -f apps/cli/dist/browse/index.html || { echo "MISSING dist/browse/index.html"; exit 1; }
          ls apps/cli/dist/*.wasm || { echo "MISSING wasm"; exit 1; }

      - name: Assemble portable bundle
        run: |
          set -e
          BUNDLE=open-zread-portable
          rm -rf "$BUNDLE"
          mkdir -p "$BUNDLE/app" "$BUNDLE/config"

          # CLI build output (index.js + browse web + wasm)
          cp -r apps/cli/dist "$BUNDLE/app/dist"

          # Runtime node_modules (dereference workspace symlinks so it's self-contained)
          cp -rL node_modules "$BUNDLE/app/node_modules"

          # Config: inject real API key from Actions secret (repo config has placeholder)
          if [ -z "${OPENROUTER_API_KEY}" ]; then
            echo "WARNING: OPENROUTER_API_KEY secret not set; bundling placeholder config."
            cp config/config.yaml "$BUNDLE/config/config.yaml"
          else
            sed "s|\${OPENROUTER_API_KEY}|${OPENROUTER_API_KEY}|g" config/config.yaml > "$BUNDLE/config/config.yaml"
          fi

          # Launcher (set by workflow below)
          echo "BUNDLE=$BUNDLE" >> "$GITHUB_ENV"
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Download standalone node.exe (Windows x64)
        run: |
          set -e
          NODE_VER=22.23.1
          URL="https://nodejs.org/dist/v${NODE_VER}/win-x64/node.exe"
          echo "Downloading $URL"
          curl -fSL "$URL" -o "$BUNDLE/node.exe"
          ls -lh "$BUNDLE/node.exe"

      - name: Write oz.bat launcher
        shell: bash
        run: |
          set -e
          cat > "$BUNDLE/oz.bat" <<'EOF'
          @echo off
          cd /d D:\IT\TB
          "%~dp0node.exe" "%~dp0app\dist\index.js" %*
          if errorlevel 1 (
            echo.
            echo [oz] exited with error code %errorlevel%. Press any key to close.
            pause >nul
          )
          EOF
          echo "--- oz.bat ---"
          cat "$BUNDLE/oz.bat"

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: open-zread-portable
          path: open-zread-portable/
          retention-days: 30
